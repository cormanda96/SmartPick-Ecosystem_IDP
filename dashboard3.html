<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>SmartPick | Manager Dashboard</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
    <div id="status-banner" class="status-banner">STORE STATUS: <span id="status-text">OPEN</span></div>

    <header class="main-header">
        <div style="display: flex; align-items: center; gap: 15px;">
            <div id="menu-toggle" onclick="toggleSidebar()" style="cursor:pointer; font-size: 1.5rem;">☰</div>
            <div class="logo">SMARTPICK</div>
        </div>
        <nav id="top-nav-links">
        </nav>
    </header>

    <div class="side-panel" id="side-panel"><nav id="side-nav"></nav></div>

    <main id="main-content" class="main-content">
        <h2 style="color: var(--main-blue);">STORE MANAGER COMMAND CENTER</h2>
        
        <div class="stat-card" style="margin-top: 20px; display: flex; justify-content: space-between; align-items: center;">
            <div>
                <h3 id="current-status-label">Store status : </h3>
            </div>
            <button onclick="toggleStoreGlobal()" class="btn-role" id="toggle-btn" style="background-color: var(--closed-red); color: white;">CLOSE STORE</button>
        </div>

        <div style="display:flex; gap:20px; flex-wrap:wrap; margin-top:30px;">
            <div class="stat-card" style="flex:1; background:white; padding:20px; border-radius:12px; border:1px solid #ddd; text-align:center;">
                <p style="color:#555; font-size:0.85rem; margin:0;">Waiting for Packing</p>
                <h2 id="pending-packing-count" style="color:var(--main-blue); margin:10px 0;">—</h2>
                <a href="dispense.html" style="display:inline-block; padding:6px 16px; background:var(--main-blue); color:white; border-radius:6px; text-decoration:none; font-size:0.85rem; font-weight:600;">Go to Dispense →</a>
            </div>
            <div class="stat-card" style="flex:1; background:white; padding:20px; border-radius:12px; border:1px solid #ddd; text-align:center;">
                <p style="color:#555; font-size:0.85rem; margin:0;">Fulfilled Dispense Logs</p>
                <h2 id="fulfilled-count" style="color:#28a745; margin:10px 0;">—</h2>
                <a href="history.html" style="display:inline-block; padding:6px 16px; background:#28a745; color:white; border-radius:6px; text-decoration:none; font-size:0.85rem; font-weight:600;">Go to History →</a>
            </div>
        </div>

        <div class="dashboard-grid" style="margin-top: 30px;">
            <div class="activity-box" style="background: white; padding: 20px; border-radius: 12px; border: 1px solid #ddd;">
                <h3>Current Stock Levels</h3>
                <div id="category-tabs" style="display:flex; flex-wrap:wrap; gap:8px; margin-bottom:16px;"></div>
                <div id="stock-table-container"></div>
            </div>
        </div>
    </main>

    <script type="module" src="app.js"></script>
   
</body>
</html>
