<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SmartPick | Catalog</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="status-banner" class="status-banner">
        STORE STATUS: <span id="status-text">CHECKING...</span>
    </div>

    <header class="main-header">
        <div style="display: flex; align-items: center; gap: 15px;">
            <div id="menu-toggle" onclick="toggleSidebar()" style="cursor:pointer; font-size: 1.5rem;">☰</div>
            <div class="logo">SMARTPICK</div>
        </div>
        <nav id="top-nav-links">
            <a href="index.html">Home</a>
            <a href="#" onclick="logout()" class="logout-btn">Log Out</a>
        </nav>
    </header>

    <div class="side-panel" id="side-panel">
        <nav id="side-nav">
            </nav>
    </div>
    
    <main class="catalog-container">
        <div class="catalog-header">
            <h2 style="color: var(--main-blue);">SMARTPICK CATALOG</h2>
                <div class="search-box">
                    <input type="text" id="catalogSearch" placeholder="Search components or categories..." onkeyup="filterCatalog()">
                    <select id="categorySelect" onchange="filterCatalog()">
                        <option value="all">All Categories</option>
                        <option value="Battery,BH & CM">Battery,BH & CM</option>
                        <option value="Resistor">Resistor</option>
                        <option value="Varaible resistor">Varaible resistor</option>
                        <option value="Capacitor">Capacitor</option>
                        <option value="microcontroller">microcontroller</option>
                        <option value="arduino">arduino</option>
                        <option value="IC">IC</option>
                        <option value="transistor">transistor</option>
                        <option value="Mosfet">Mosfet</option>
                        <option value="Thrysistor">Thrysistor</option>
                        <option value="inductor">inductor</option>
                        <option value="Crystal">Crystal</option>
                        <option value="Diode">Diode</option>
                        <option value="Indicator">Indicator</option>
                        <option value="Connect & Socket">Connect & Socket</option>
                        <option value="Transformer">Transformer</option>
                        <option value="Switch">Switch</option>
                        <option value="relay">relay</option>
                        <option value="Cable">Cable</option>
                        <option value="PCB Board">PCB Board</option>
                        <option value="Motor">Motor</option>
                        <option value="Sensor">Sensor</option>
                        <option value="fuse">fuse</option>
                        <option value="others">others</option>
                        <option value="raspberry pie">Raspberry Pi</option>
                    </select>
                    <div id="manager-add-btn" style="display:none;">
                        <button onclick="addNewComponent()" style="padding:8px 16px; background:var(--main-blue); color:white; border:none; border-radius:6px; cursor:pointer; font-weight:600; white-space:nowrap;">+ New Component</button>
                    </div>
                </div>
            <div class="catalog-category-nav" id="catalog-category-nav" style="margin-top:12px; display:flex; flex-wrap:wrap; gap:8px;"></div>
        </div>

        <div id="catalog-grid" class="catalog-grid"></div>
    </main>
    <script type="module" src="app.js"></script>
</body>
</html>
