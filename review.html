<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SmartPick | Review Proposals</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <style>
        /* review.html page-specific styles */
        .review-layout {
            display: flex;
            gap: 20px;
            margin-top: 20px;
        }

        /* 1. Student Master List (Left) */
        .pending-sidebar {
            flex: 1;
            background: white;
            padding: 15px;
            border-radius: 12px;
            border: 1px solid #eee;
            min-width: 280px;
        }

        .student-item {
            padding: 12px;
            background: #fcfcfc;
            border: 1px solid #f1f1f1;
            margin-bottom: 10px;
            border-radius: 8px;
            cursor: pointer;
            transition: 0.3s;
        }

        .student-item:hover { background: #e3f2fd; border-color: var(--main-blue); }
        .student-item.active { background: var(--main-blue); color: white; border-color: var(--main-blue); }
        .student-item.active small { color: #e3f2fd; }

        /* 2. Proposal Detail Viewer (Main/Right) */
        .proposal-viewer {
            flex: 3;
            background: white;
            padding: 25px;
            border-radius: 12px;
            border: 1px solid #eee;
        }

        .comparison-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-top: 20px;
        }

        .image-viewer {
            border: 2px dashed #ddd;
            padding: 10px;
            border-radius: 8px;
            text-align: center;
        }

        .component-list-view {
            border: 1px solid #eee;
            border-radius: 8px;
            padding: 10px;
        }

        /* 3. Decision Area (Feedback + Buttons) */
        .decision-box {
            margin-top: 30px;
            background-color: #f9f9f9;
            padding: 20px;
            border-radius: 12px;
            border: 1px solid #ddd;
        }

        .feedback-input {
            width: 100%;
            height: 80px;
            padding: 10px;
            border-radius: 8px;
            border: 1px solid #ccc;
            margin-bottom: 15px;
            resize: none;
            font-family: inherit;
        }

        .action-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
        }
    </style>
</head>
<body>
    <div id="status-banner" class="status-banner">STORE STATUS: <span id="status-text">OPEN</span></div>

    <header class="main-header">
        <div style="display: flex; align-items: center; gap: 15px;">
            <div id="menu-toggle" onclick="toggleSidebar()" style="cursor:pointer; font-size: 1.5rem;">☰</div>
            <div class="logo">SMARTPICK</div>
        </div>
        <nav id="top-nav-links">
            <a href="dashboard2.html">Home</a>
        </nav>
    </header>

    <div class="side-panel" id="side-panel">
        <nav id="side-nav"></nav>
    </div>

    <main id="main-content" class="main-content">
        <h2 style="color: var(--main-blue); margin-bottom: 5px;">REVIEW HARDWARE PROPOSALS</h2>
        <p style="color: #666;">Select a student from the list to audit their circuit design and component requests.</p>

        <div class="review-layout">
            <aside class="pending-sidebar">
                <h3 style="font-size: 1rem; margin-bottom: 15px; border-bottom: 1px solid #eee; padding-bottom: 10px;">PENDING ({<span id="pending-count">0</span>})</h3>
                <div id="master-student-list">
                    </div>
            </aside>

            <section class="proposal-viewer" id="proposal-viewer-panel">
                <div style="display: flex; justify-content: space-between; align-items: center;">
                    <h3 id="current-student-name">Select a Student</h3>
                    <small id="current-proposal-id" style="color: #888;"></small>
                </div>

                <div class="comparison-grid">
                    <div class="image-viewer">
                        <p style="color: #666; font-size: 0.9rem; margin-bottom: 10px;">CIRCUIT DIAGRAM</p>
                        <img id="diagram-preview" src="" alt="No Diagram Uploaded" style="max-width: 100%; border-radius: 5px;">
                    </div>
                    <div class="component-list-view">
                        <p style="color: #666; font-size: 0.9rem; margin-bottom: 10px;">REQUESTED ITEMS</p>
                        <table class="proposal-table" style="width: 100%; font-size: 0.85rem;">
                            <thead><tr><th>Item</th><th>Qty</th><th>Status</th></tr></thead>
                            <tbody id="component-table-body">
                                </tbody>
                        </table>
                    </div>
                </div>

                <div class="decision-box">
                    <p style="font-weight: 600; margin-bottom: 10px;">SUPERVISOR FEEDBACK (REQUIRED IF DECLINED)</p>
                    <textarea id="feedback-comment" class="feedback-input" placeholder="Type comments or reasons for declination here..."></textarea>
                    
                    <div class="action-grid">
                        <button onclick="handleDecision('Approved')" class="btn-role" style="background-color: var(--open-green); color: white; border: none;">
                            APPROVE PROPOSAL
                        </button>
                        <button onclick="handleDecision('Declined')" class="btn-role" style="background-color: var(--closed-red); color: white; border: none;">
                            DECLINE PROPOSAL
                        </button>
                    </div>
                </div>
            </section>
        </div>
    </main>

    <script type="module" src="app.js"></script>
    <script src="review.js"></script> </body>
</html>
