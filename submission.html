<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SmartPick | Submit Proposal</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="status-banner" class="status-banner">
        STORE STATUS: <span id="status-text">CHECKING...</span>
    </div>

    <header class="main-header">
        <div style="display: flex; align-items: center; gap: 15px;">
            <div id="menu-toggle" onclick="toggleSidebar()" style="cursor:pointer; font-size: 1.5rem;">☰</div>
            <div class="logo">SMARTPICK</div>
        </div>
        <nav id="top-nav-links">
            <a href="dashboard2.html">Home</a>
        </nav>
    </header>

    <div class="side-panel" id="side-panel">
        <nav id="side-nav">
            </nav>
    </div>

    <main class="auth-container">
    <div class="auth-box" style="max-width: 600px;">
        <h2 style="color: var(--main-blue);">SUBMIT PROPOSAL</h2>
        
        <form id="submission-form">
            <div class="upload-section">
                <p style="text-align: left; font-size: 0.9rem; font-weight: 600;">Upload Circuit Diagram:</p>
                <input type="file" id="circuit-upload" accept="image/*" required>
            </div>

            <div class="selection-area" style="margin-top: 20px; text-align: left; background: #f0f7ff; padding: 15px; border-radius: 10px;">
                <p style="font-size: 0.9rem; font-weight: 600; color: var(--main-blue);">Request Components:</p>
    
                <div style="margin-bottom: 15px;">
                    <label style="font-size: 0.8rem;">From Store Inventory:</label>
                    <div style="display: flex; gap: 10px;">
                        <select id="component-selector" style="flex: 1; padding: 10px;">
                            <option value="">-- Choose Item --</option>
                        </select>
                        <button type="button" onclick="addItemToList('store')" class="btn-role" style="margin: 0;">ADD</button>
                    </div>
                </div>

                <div>
                    <label style="font-size: 0.8rem;">Custom / Self-Provided (Not in Store):</label>
                    <div style="display: flex; gap: 10px;">
                        <input type="text" id="custom-item-name" placeholder="Type component name..." style="flex: 1; margin: 0;">
                        <button type="button" onclick="addItemToList('custom')" class="btn-role" style="margin: 0; background-color: var(--light-blue);">ADD</button>
                    </div>
                </div>
            </div>

            <div id="request-list" style="margin-top: 20px; text-align: left;">
                <p style="font-size: 0.8rem; color: #666;">Final Project Component List:</p>
                <div id="selected-items-container">
                </div>
            </div>

            <button type="submit" class="btn-primary-full" style="margin-top: 30px;">SUBMIT TO SUPERVISOR</button>
        </form>
    </div>
    </main>

    <script type="module" src="app.js"></script>
</body>
</html>
